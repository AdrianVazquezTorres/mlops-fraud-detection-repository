version: '3.8'

x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - PYTHONPATH=/opt/airflow
  volumes:
    # Carpetas nativas de Airflow
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    # Carpetas de datos y MLflow (CRUCIAL para la estrategia de las imágenes)
    - ./data:/opt/airflow/data
    - ./mlruns:/opt/airflow/mlruns
    - ./mlflow.db:/opt/airflow/mlflow.db
    - ./src:/opt/airflow/src  # Para que tengan acceso a train_dummy.py y transformers.py
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    ports:
      - "5432:5432"
    volumes: # <--- AÑADE ESTAS DOS LÍNEAS AQUÍ
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler

  # Servicio para inicializar la base de datos de Airflow la primera vez
  # Servicio para inicializar la base de datos de Airflow la primera vez
  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      # REPETIMOS las variables base aquí para evitar que YAML las sobrescriba
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      # Variables exclusivas de inicialización
      - _AIRFLOW_DB_UPGRADE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin

  # Apache kafka integration
  zookeeper:
    image: bitnami/zookeeper:latest
    container_name: zookeeper
    networks:
      - airflow-network # Usamos la misma red que Airflow para que se vean
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    ports:
      - "2181:2181"

  kafka:
    image: bitnami/kafka:latest
    container_name: kafka
    networks:
      - airflow-network
    ports:
      - "9092:9092" # Puerto para comunicación interna/Docker
      - "9094:9094" # Puerto para comunicación externa (tu PC local)
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_ANONYMOUS_LOGIN=yes
      # Configuración de red para que Kafka sepa quién le habla:
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,EXTERNAL://:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
    depends_on:
      - zookeeper
    volumes:
      - kafka_data:/bitnami/kafka # Persistencia de datos

# No olvides añadir el volumen al final de tu archivo
volumes:
  postgres-data:
  kafka_data:
    driver: local

volumes: # <--- AÑADE ESTO AL FINAL DE TODO EL ARCHIVO
  postgres-data: